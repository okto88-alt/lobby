<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Staff Lobby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="room"></canvas>
<div class="logo"><h1 id="roomTitle">STAFF<br>LOBBY</h1></div>
<div class="status"><span class="dot" id="dot"></span><span id="statusTxt">Demo</span></div>
<div id="log"></div>

<div class="bar">
  <input id="msg" type="text" maxlength="120" placeholder="Tulis pesan..." autocomplete="off" />
  <div class="btn heart" id="heartBtn">♥</div>
  <div class="btn" id="sendBtn">SEND</div>
</div>

<!-- GATE -->
<div id="gate" class="overlay">
  <div class="card">
    <h2>STAFF LOBBY</h2>
    <p>Masukin password room</p>
    <input id="passIn" type="password" placeholder="Password" />
    <button class="go" id="gateBtn">MASUK</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<!-- BUILDER -->
<div id="builder" class="overlay" style="display:none">
  <div class="card">
    <h2>BIKIN AVATAR</h2>
    <canvas id="pv" width="120" height="150"></canvas>
    <input id="nameIn2" type="text" maxlength="14" placeholder="Nama kamu" />
    <div class="loadnote" id="loadNote"></div>
    <div class="opt"><span>Kulit</span><div class="row" id="rowSkin"></div></div>
    <div class="opt"><span>Model rambut</span><div class="row" id="rowHairStyle"></div></div>
    <div class="opt"><span>Warna rambut</span><div class="row" id="rowHairColor"></div></div>
    <div class="opt"><span>Baju</span><div class="row" id="rowShirt"></div></div>
    <button class="go" id="enterBtn">MASUK ROOM</button>
    <div class="hint">Tap lantai buat jalan · Enter buat chat · ♥ kasih reaksi</div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://driving-flights-economics-historic.trycloudflare.com/socket.io/socket.io.js"></script>
</body>
</html>
